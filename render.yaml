# Deploy do motor de análise ScoreLab no Render (plano gratuito).
# No Render: New + > Blueprint > escolher este repositório > Apply.
services:
  - type: web
    name: scorelab-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SCORELAB_ALLOWED_ORIGINS
        value: https://scorelab-analytics.vercel.app,http://localhost:8080
